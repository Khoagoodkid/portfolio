name: Vite Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    # needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
  
      - name: Pull latest code and build docker image 
        uses: appleboy/ssh-action@master
        with: 
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            echo "Pulling latest code"
            cd /root/services/portfolio
            git fetch origin 
            git checkout main
            git reset --hard origin/main
            git pull origin main

            echo "VITE_API_BASE=${{ secrets.VITE_API_BASE }}" >> ./client/.env
            echo "APP_PASS=${{ secrets.APP_PASS }}" >> ./server/.env
            echo "PORT=${{ secrets.PORT }}" >> ./server/.env

            echo "Building docker images..."

            docker compose down
            docker compose up --build -d


      - name: Clean up 
        if: success() # Only run if deployment was successful
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            docker image prune -f
      