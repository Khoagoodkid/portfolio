services:

  client:
    build:
      context: ./client
      dockerfile: dockerfile
    restart: always
    ports:
      - "3001:80"
    deploy: 
      mode: replicated
      replicas: 1

  server:
    build:
      context: ./server
      dockerfile: dockerfile
    restart: always
    env_file:
      - ./server/.env
    ports:
      - "8001:8001"
    deploy:
      mode: replicated
      replicas: 1

